name: Deploy Docs

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Generate API docs
        run: |
          mkdir -p docs-site
          echo "# YYC³ AI Family Documentation" > docs-site/index.md
          echo "" >> docs-site/index.md
          echo "## Packages" >> docs-site/index.md
          for pkg in core ai-hub ui plugins i18n-core; do
            echo "- [@yyc3/${pkg}](./${pkg}/index.html)" >> docs-site/index.md
            if [ -f "packages/${pkg}/README.md" ]; then
              mkdir -p "docs-site/${pkg}"
              cp "packages/${pkg}/README.md" "docs-site/${pkg}/index.md"
            fi
          done
          echo "" >> docs-site/index.md
          echo "Generated on: $(date -u +%Y-%m-%d)" >> docs-site/index.md

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deploy
        uses: actions/deploy-pages@v5
