name: Release to npm & GHCR

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Type check all packages
        run: pnpm -r typecheck

      - name: Lint all packages
        run: pnpm -r lint

      - name: Test all packages
        run: |
          set +e
          for pkg in core ai-hub ui plugins i18n-core; do
            echo "▶️ Testing @yyc3/$pkg ..."
            pnpm --filter @yyc3/$pkg test 2>&1 | head -100
            EXIT_CODE=${PIPESTATUS[0]}
            if [ $EXIT_CODE -ne 0 ]; then
              echo "::error::@yyc3/$pkg tests failed with exit code $EXIT_CODE"
              echo "🔍 Full test output for @yyc3/$pkg:"
              pnpm --filter @yyc3/$pkg test || true
              exit $EXIT_CODE
            fi
            echo "✅ @yyc3/$pkg tests passed"
          done

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Scan for Secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          config-path: .gitleaks.toml
          verbose: true
        continue-on-error: true

  publish-packages:
    name: Publish @yyc3/${{ matrix.package }}
    needs: quality-gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [core, ai-hub, ui, plugins, i18n-core]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./packages/${{ matrix.package }}/package.json').version")
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "Package version: $PKG_VERSION"
          echo "Tag version: $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Package version $PKG_VERSION does not match tag $TAG_VERSION"
            exit 1
          fi

      - name: Determine dist-tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == *"beta"* ]] || [[ "${GITHUB_REF}" == *"alpha"* ]]; then
            echo "tag=beta" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == *"rc"* ]]; then
            echo "tag=rc" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build package
        run: pnpm --filter @yyc3/${{ matrix.package }} run build

      - name: Publish to npm
        run: pnpm --filter @yyc3/${{ matrix.package }} publish --access public --provenance --tag ${{ steps.tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.YYC3_NPM_TOKEN }}

  docker-release:
    name: Docker Release
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image with cosign
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  changelog-update:
    name: Update Changelog
    needs: publish-packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate changelog
        run: npx conventional-changelog -p angular -i CHANGELOG.md -s -r 1 || echo "No changes"

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update CHANGELOG [skip ci]" || echo "No changes"
          git push || echo "Nothing to push"

  post-release-verify:
    name: Post Release Verification
    needs: [publish-packages, docker-release]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Verify npm packages
        run: |
          echo "📦 Verifying published packages..."
          for pkg in core ai-hub ui plugins i18n-core; do
            VERSION=$(npm view @yyc3/$pkg version 2>/dev/null || echo "not found")
            echo "  @yyc3/$pkg: $VERSION"
          done

      - name: Summary
        run: |
          echo "🎉 Release ${{ github.ref_name }} completed successfully!"
          echo ""
          echo "Published:"
          echo "  - 5 npm packages (@yyc3/*)"
          echo "  - Docker image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          echo "  - Changelog updated"
