name: CI Validation (Legacy - Disabled)

on:
  workflow_dispatch:

env:
  NODE_ENV: test

jobs:
  validation:
    name: Jest Unit Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Jest unit tests
        run: npm run test:ci
