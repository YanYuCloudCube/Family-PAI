<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="piGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="cubeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#0F172A" stroke="url(#piGrad)" stroke-width="3"/>
  
  <!-- π Symbol -->
  <g transform="translate(55, 45) scale(0.65)">
    <path d="M40,30 L40,180 M40,30 Q60,15 80,30 L80,155 Q80,170 100,170 L115,170 Q130,170 130,155 L130,30"
          fill="none" stroke="url(#piGrad)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="28" y1="35" x2="142" y2="35" stroke="url(#piGrad)" stroke-width="20" stroke-linecap="round"/>
  </g>
  
  <!-- ³ -->
  <g transform="translate(138, 52)">
    <rect x="0" y="5" width="20" height="20" rx="3" fill="url(#cubeGrad)"/>
    <text x="10" y="20" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">3</text>
  </g>
  
  <!-- Mini Home -->
  <g transform="translate(72, 145) scale(0.5)">
    <path d="M56,20 L0,55 L0,60 L112,60 L112,55 Z" fill="#F59E0B"/>
    <rect x="15" y="55" width="82" height="50" rx="4" fill="#F59E0B"/>
    <rect x="45" y="75" width="22" height="30" rx="2" fill="#0F172A"/>
  </g>
</svg>