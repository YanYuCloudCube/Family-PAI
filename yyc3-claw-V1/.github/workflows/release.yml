name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Get version from tag
        id: get-version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create .npmrc
        run: |
          cat > .npmrc << EOF
            //registry.npmjs.org/:_authToken=\${NPM_TOKEN}
            @claw-ai:registry=https://registry.npmjs.org/
          EOF

      - name: Publish to NPM
        run: |
          cd packages/claw-core
          pnpm publish --access public --no-git-checks
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: Release v${{ steps.get-version.outputs.version }}
          body: |
            ## 🚀 发布说明
            
            ### 安装方式
            ```bash
            npm install @claw-ai/core@${{ steps.get-version.outputs.version }}
            # 或
            pnpm add @claw-ai/core@${{ steps.get-version.outputs.version }}
            ```
            
            ### 变更内容
            查看 [CHANGELOG.md](./CHANGELOG.md) 获取详细变更内容。
            
            ---
            
            > 此版本由 🤖 YYC³ Claw AI 自动发布
          draft: false
          prerelease: ${{ contains(steps.get-version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## ✅ 发布成功!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **版本**: v${{ steps.get-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **NPM包**: [@claw-ai/core@${{ steps.get-version.outputs.version }}](https://www.npmjs.com/package/@claw-ai/core/v/${{ steps.get-version.outputs.version }})" >> $GITHUB_STEP_SUMMARY
